<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin conexion</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: radial-gradient(
          circle at top left,
          #dbeafe 0%,
          #f4f8ff 55%
        );
        color: #0f172a;
      }

      .card {
        max-width: 460px;
        margin: 0 1rem;
        padding: 1.5rem;
        border-radius: 1rem;
        background: #fff;
        border: 2px solid #bfdbfe;
        box-shadow: 0 14px 28px rgba(37, 99, 235, 0.12);
      }

      h1 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Estas sin conexion</h1>
      <p>La app sigue disponible con los recursos guardados en cache.</p>
      <p>Cuando regreses a internet, recarga para sincronizar cambios.</p>
    </section>
  </body>
</html>
